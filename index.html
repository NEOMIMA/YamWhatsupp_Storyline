<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שיחת וואטסאפ - ים ואורי</title>
    <!-- טעינת Tailwind בטוחה -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent; 
        }
        
        .chat-bg {
            background-color: #efeae2;
            background-image: radial-gradient(#cfc5b9 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .typing-dot {
            animation: typing 1s infinite ease-in-out;
        }
        
        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-3px); opacity: 1; }
        }

        .chat-container::-webkit-scrollbar {
            width: 5px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.15);
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

    <div class="w-full max-w-[380px] h-[750px] bg-white rounded-[3rem] shadow-2xl border-[12px] border-[#111b21] overflow-hidden flex flex-col relative mx-auto">
        
        <!-- שורת סטטוס -->
        <div class="h-6 w-full bg-[#008069] flex items-center justify-between px-5 text-[11px] text-white font-medium z-20">
            <span>10:30</span>
            <div class="flex items-center gap-1">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21L15.6 16.2C14.6 15.4 13.4 15 12 15C10.6 15 9.4 15.4 8.4 16.2L12 21ZM12 3C7.9 3 4.2 4.6 1.4 7.2L3.6 10.1C5.8 8.1 8.8 6.9 12 6.9C15.2 6.9 18.2 8.1 20.4 10.1L22.6 7.2C19.8 4.6 16.1 3 12 3Z"/></svg>
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
            </div>
        </div>

        <!-- כותרת האפליקציה (אורי) -->
        <div class="bg-[#008069] text-white flex items-center px-3 py-2 shadow-md z-10 gap-3">
            <button class="text-white flex items-center -ml-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
            <img src="אורי.jpg" class="w-10 h-10 rounded-full object-cover" alt="אורי">
            <div class="flex-1 flex flex-col justify-center">
                <h1 class="font-semibold text-[17px] leading-tight">אורי</h1>
                <p id="status-text" class="text-[12px] opacity-90 leading-tight">מחובר</p>
            </div>
            <div class="flex gap-4 px-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M21 16.42v3.536a1 1 0 0 1-.93 1.002c-4.396.286-8.508-1.583-11.597-4.673C5.383 13.194 3.514 9.083 3.8 4.686A1 1 0 0 1 4.801 3.8h3.536a1 1 0 0 1 .986.836c.16 1.01.442 1.99.833 2.92a1 1 0 0 1-.264 1.1l-1.54 1.541a13.996 13.996 0 0 0 6.643 6.643l1.54-1.541a1 1 0 0 1 1.1-.264c.931.391 1.91.674 2.92.833a1 1 0 0 1 .836.986z"></path></svg>
            </div>
        </div>

        <!-- אזור השיחה -->
        <div id="chat-container" class="flex-1 chat-bg p-4 overflow-y-auto flex flex-col relative chat-container">
            <!-- הודעות יופיעו כאן -->
        </div>

        <!-- אזור הקלדת הודעה -->
        <div class="bg-[#f0f2f5] px-2 py-2 flex items-center gap-2 z-10 border-t border-gray-300">
            <div id="message-input" class="flex-1 bg-white rounded-full h-[42px] flex items-center px-4 shadow-sm text-gray-400 text-[15px] overflow-hidden whitespace-nowrap">
                הודעה
            </div>
            <div class="w-[42px] h-[42px] bg-[#00a884] rounded-full flex items-center justify-center text-white shadow-sm flex-shrink-0">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M11.999 14.942c2.005 0 3.531-1.53 3.531-3.531V4.35c0-2.001-1.526-3.531-3.531-3.531S8.469 2.349 8.469 4.35v7.061c0 2.001 1.526 3.531 3.53 3.531zm6.238-3.53c0 3.531-2.942 6.002-6.237 6.002s-6.237-2.471-6.237-6.002H3.761c0 4.001 3.178 7.297 7.061 7.885v3.884h2.354v-3.884c3.884-.588 7.061-3.884 7.061-7.885h-2.001z"></path></svg>
            </div>
        </div>
    </div>

    <script>
        const conversation = [
            { sender: 'yam', text: 'היי... רוצה לשחק יחד מחר בהפסקה? 😊', typeDelay: 2000, readDelay: 1200 },
            { sender: 'uri', text: 'כן 😄', typeDelay: 1500, readDelay: 1200 },
            { sender: 'yam', text: 'ואולי להחזיק ידיים קצת?', typeDelay: 2500, readDelay: 1500 },
            { sender: 'uri', text: 'אוקיי... אבל רק אם גם את רוצה.', typeDelay: 3500, readDelay: 1500 },
            { sender: 'yam', text: 'רוצה 😊', typeDelay: 1500, readDelay: 800 }
        ];

        const chatContainer = document.getElementById('chat-container');
        const statusText = document.getElementById('status-text');
        const messageInput = document.getElementById('message-input');
        let isAnimating = false;

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function createTypingElement() {
            const div = document.createElement('div');
            div.className = `flex justify-start w-full mb-4 opacity-0 translate-y-2 transition-all duration-300`;
            div.innerHTML = `
                <div class="flex items-end max-w-[85%]">
                    <div class="bg-white rounded-br-2xl rounded-bl-2xl rounded-tr-2xl rounded-tl-sm px-4 py-3 shadow-sm flex items-center justify-center gap-1 min-w-[60px] h-[38px]">
                        <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot" style="animation-delay: 0s"></div>
                        <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot" style="animation-delay: 0.2s"></div>
                        <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `;
            return div;
        }

        function createMessageElement(msg) {
            const isMe = msg.sender === 'yam'; 
            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} w-full mb-4`;
            
            const time = "10:30";
            const checkmarks = isMe ? `<svg class="w-4 h-4 text-[#53bdeb] ml-1" viewBox="0 0 16 15" width="16" height="15"><path fill="currentColor" d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.319.319 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.064-.512zm-4.1 0l-.478-.372a.365.365 0 0 0-.51.063L4.566 9.879a.32.32 0 0 1-.484.033L1.891 7.769a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0 .006.514l3.258 3.185c.143.14.361.125.484-.033l6.272-8.048a.365.365 0 0 0-.063-.51z"></path></svg>` : '';
            const bgClass = isMe ? 'bg-[#dcf8c6] rounded-br-sm rounded-bl-2xl rounded-tl-2xl rounded-tr-2xl' : 'bg-white rounded-br-2xl rounded-bl-2xl rounded-tr-2xl rounded-tl-sm';

            div.innerHTML = `
                <div class="flex items-end max-w-[85%] opacity-0 translate-y-4 transition-all duration-300 ease-out message-appear">
                    <div class="${bgClass} px-3 py-2 shadow-sm relative flex flex-col min-w-[80px]">
                        <span class="text-[#111b21] text-[15px] leading-snug break-words">${msg.text}</span>
                        <div class="text-[10px] text-gray-500 flex justify-end items-center mt-1 -mb-1">
                            <span>${time}</span>
                            ${checkmarks}
                        </div>
                    </div>
                </div>
            `;
            return div;
        }

        async function runAnimation() {
            if (isAnimating) return;
            isAnimating = true;
            chatContainer.innerHTML = '';
            statusText.innerText = 'מחובר';
            messageInput.innerText = 'הודעה';
            messageInput.classList.add('text-gray-400');
            messageInput.classList.remove('text-black');
            
            const dateDiv = document.createElement('div');
            dateDiv.className = 'flex justify-center my-3';
            dateDiv.innerHTML = `<span class="bg-[#e1f3fb] text-gray-600 text-[11px] py-1.5 px-3 rounded-lg shadow-sm">היום</span>`;
            chatContainer.appendChild(dateDiv);

            await sleep(800);

            for (let msg of conversation) {
                const isMe = msg.sender === 'yam';
                
                if (isMe) {
                    messageInput.innerText = '';
                    messageInput.classList.remove('text-gray-400');
                    messageInput.classList.add('text-black');
                    
                    const chars = msg.text.split('');
                    const timePerChar = msg.typeDelay / chars.length;
                    let typedText = '';
                    
                    for(let char of chars) {
                        typedText += char;
                        messageInput.innerText = typedText;
                        await sleep(timePerChar);
                    }
                    
                    await sleep(200); 
                    messageInput.innerText = 'הודעה';
                    messageInput.classList.remove('text-black');
                    messageInput.classList.add('text-gray-400');

                } else {
                    statusText.innerText = 'מקליד...';
                    const typingEl = createTypingElement();
                    chatContainer.appendChild(typingEl);
                    
                    requestAnimationFrame(() => {
                        typingEl.classList.remove('opacity-0', 'translate-y-2');
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    });

                    await sleep(msg.typeDelay);
                    typingEl.remove();
                    statusText.innerText = 'מחובר';
                }

                const msgEl = createMessageElement(msg);
                chatContainer.appendChild(msgEl);
                
                requestAnimationFrame(() => {
                    const inner = msgEl.querySelector('.message-appear');
                    inner.classList.remove('opacity-0', 'translate-y-4');
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                });
                
                await sleep(msg.readDelay);
            }
            
            const replayBtn = document.createElement('div');
            replayBtn.className = 'flex justify-center mt-6 mb-2 opacity-0 transition-opacity duration-500';
            replayBtn.innerHTML = `
                <button onclick="resetAndPlay()" class="bg-white text-[#008069] px-5 py-2 rounded-full shadow-md text-sm font-bold hover:bg-gray-50 transition-colors flex items-center gap-2 cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    נגן מחדש
                </button>
            `;
            chatContainer.appendChild(replayBtn);
            requestAnimationFrame(() => {
                replayBtn.classList.remove('opacity-0');
                chatContainer.scrollTop = chatContainer.scrollHeight;
            });
            
            isAnimating = false;
        }

        function resetAndPlay() {
            runAnimation();
        }

        window.onload = function() {
            runAnimation();
        };
    </script>
</body>
</html>
